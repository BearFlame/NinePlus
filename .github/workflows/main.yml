name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s '/Applications/Xcode.app/Contents/Developer'

      # 【核心】修补源码，移除 iOS 26 专有 API
      - name: Patch source code for iOS 17 compatibility
        run: |
          cd mini-ninebot
          # 替换 mapItem.address?.shortAddress
          find . -name "*.swift" -exec sed -i '' 's/mapItem\.address?\.shortAddress/mapItem.placemark.title ?? ""/g' {} \;
          # 替换 mapItem.address?.street
          find . -name "*.swift" -exec sed -i '' 's/mapItem\.address?\.street/mapItem.placemark.thoroughfare ?? ""/g' {} \;
          # 替换 mapItem.address?.city
          find . -name "*.swift" -exec sed -i '' 's/mapItem\.address?\.city/mapItem.placemark.locality ?? ""/g' {} \;
          # 替换 mapItem.address?.state
          find . -name "*.swift" -exec sed -i '' 's/mapItem\.address?\.state/mapItem.placemark.administrativeArea ?? ""/g' {} \;
          # 替换 mapItem.address?.postalCode
          find . -name "*.swift" -exec sed -i '' 's/mapItem\.address?\.postalCode/mapItem.placemark.postalCode ?? ""/g' {} \;
          # 替换其他可能的 address 属性（如果有的话）
          find . -name "*.swift" -exec sed -i '' 's/mapItem\.address?\.country/mapItem.placemark.country ?? ""/g' {} \;
          echo "Patched iOS 26 APIs to iOS 17 compatible ones."

      # 删除 _LocationEssentials 框架引用
      - name: Remove _LocationEssentials framework from project
        run: |
          cd mini-ninebot
          cp mini-ninebot.xcodeproj/project.pbxproj mini-ninebot.xcodeproj/project.pbxproj.bak
          sed -i '' '/_LocationEssentials/d' mini-ninebot.xcodeproj/project.pbxproj

      - name: Build archive (unsigned)
        run: |
          cd mini-ninebot
          xcodebuild -project mini-ninebot.xcodeproj \
            -scheme mini-ninebot \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            archive -archivePath ../build/app.xcarchive

      - name: Export IPA
        run: |
          mkdir -p Payload
          find build/app.xcarchive -name "*.app" -exec cp -R {} Payload/ \;
          zip -r NinePlus-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NinePlus-unsigned
          path: NinePlus-unsigned.ipa
