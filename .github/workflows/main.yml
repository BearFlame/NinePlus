name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s '/Applications/Xcode.app/Contents/Developer'

      # 进入项目所在目录（mini-ninebot 文件夹）
      - name: Change to project directory
        run: |
          cd mini-ninebot
          echo "Current directory: $(pwd)"
          ls -la

      # 列出所有 Scheme（关键步骤，请务必查看输出）
      - name: List available schemes
        run: |
          cd mini-ninebot
          xcodebuild -project mini-ninebot.xcodeproj -list

      # 构建归档（无签名）
      # 注意：Scheme 名称请根据上一步输出修改（这里默认用 mini-ninebot）
      - name: Build archive (unsigned)
        run: |
          cd mini-ninebot
          xcodebuild -project mini-ninebot.xcodeproj \
            -scheme mini-ninebot \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive -archivePath ../build/app.xcarchive

      # 导出 IPA（从 archive 中提取 .app 并打包）
      - name: Export IPA
        run: |
          mkdir -p Payload
          find build/app.xcarchive -name "*.app" -exec cp -R {} Payload/ \;
          zip -r NinePlus-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NinePlus-unsigned
          path: NinePlus-unsigned.ipa
