name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    # 使用最新的 macOS 环境，因为需要 Xcode 能打开项目格式 77
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s '/Applications/Xcode.app/Contents/Developer'

      # 【核心修改】删除项目中对 _LocationEssentials 框架的所有引用
      - name: Remove _LocationEssentials framework from project
        run: |
          cd mini-ninebot
          # 备份原始项目文件（以防万一）
          cp mini-ninebot.xcodeproj/project.pbxproj mini-ninebot.xcodeproj/project.pbxproj.bak
          # 删除所有包含 "_LocationEssentials" 的行（包括框架引用和构建阶段）
          sed -i '' '/_LocationEssentials/d' mini-ninebot.xcodeproj/project.pbxproj
          echo "Removed all references to _LocationEssentials"

      - name: List available schemes
        run: |
          cd mini-ninebot
          xcodebuild -project mini-ninebot.xcodeproj -list

      - name: Build archive (unsigned)
        run: |
          cd mini-ninebot
          xcodebuild -project mini-ninebot.xcodeproj \
            -scheme mini-ninebot \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            archive -archivePath ../build/app.xcarchive

      - name: Export IPA
        run: |
          mkdir -p Payload
          find build/app.xcarchive -name "*.app" -exec cp -R {} Payload/ \;
          zip -r NinePlus-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NinePlus-unsigned
          path: NinePlus-unsigned.ipa
