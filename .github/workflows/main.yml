name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s '/Applications/Xcode.app/Contents/Developer'

      # 列出根目录文件，方便排查
      - name: List files
        run: ls -la

      # 如果存在 Podfile，则安装 CocoaPods 并生成 workspace
      - name: Install CocoaPods dependencies
        run: |
          if [ -f "Podfile" ]; then
            sudo gem install cocoapods
            pod install
          fi

      # 自动检测项目文件（.xcworkspace 或 .xcodeproj）
      - name: Detect project type
        id: detect
        run: |
          if [ -f "NinePlus.xcworkspace" ]; then
            echo "type=workspace" >> $GITHUB_ENV
            echo "path=NinePlus.xcworkspace" >> $GITHUB_ENV
          elif [ -f "NinePlus.xcodeproj" ]; then
            echo "type=project" >> $GITHUB_ENV
            echo "path=NinePlus.xcodeproj" >> $GITHUB_ENV
          else
            # 尝试查找第一个 .xcodeproj
            PROJ=$(find . -maxdepth 1 -name "*.xcodeproj" | head -1)
            if [ -n "$PROJ" ]; then
              echo "type=project" >> $GITHUB_ENV
              echo "path=$PROJ" >> $GITHUB_ENV
            else
              echo "No project file found!"
              exit 1
            fi
          fi

      # 列出所有可用的 schemes，方便你确认正确的 scheme 名称
      - name: List available schemes
        run: |
          if [ "$type" == "workspace" ]; then
            xcodebuild -workspace "$path" -list
          else
            xcodebuild -project "$path" -list
          fi

      # 编译（此处 scheme 名称暂写为 NinePlus，请根据上一步输出修改）
      - name: Build archive (unsigned)
        run: |
          if [ "$type" == "workspace" ]; then
            xcodebuild -workspace "$path" \
              -scheme NinePlus \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              archive -archivePath build/NinePlus.xcarchive
          else
            xcodebuild -project "$path" \
              -scheme NinePlus \
              -sdk iphoneos \
              -configuration Release \
              -destination 'generic/platform=iOS' \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              archive -archivePath build/NinePlus.xcarchive
          fi

      # 从 .xcarchive 中提取 .app 并打包成 .ipa
      - name: Export IPA
        run: |
          mkdir -p Payload
          find build/NinePlus.xcarchive -name "*.app" -exec cp -R {} Payload/ \;
          zip -r NinePlus-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NinePlus-unsigned
          path: NinePlus-unsigned.ipa
