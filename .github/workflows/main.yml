name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:  # 允许你手动触发构建

jobs:
  build:
    runs-on: macos-latest  # 使用 GitHub 提供的 macOS 环境[reference:1]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s '/Applications/Xcode.app/Contents/Developer'

      - name: Build and Archive (Unsigned)
        run: |
          xcodebuild -workspace NinePlus.xcworkspace \
            -scheme NinePlus \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGNING_REQUIRED="NO" \
            archive -archivePath build/NinePlus.xcarchive
        continue-on-error: false

      - name: Export IPA (Unsigned)
        run: |
          mkdir -p Payload
          find build/NinePlus.xcarchive -name "*.app" -exec cp -R {} Payload/ \;
          zip -r NinePlus-unsigned.ipa Payload/
        continue-on-error: false

      - name: Upload IPA as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NinePlus-unsigned
          path: NinePlus-unsigned.ipa
