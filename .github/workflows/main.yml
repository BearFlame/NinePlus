name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    # 关键修改：使用 macOS 14 环境，它内置 Xcode 15.x（对应 iOS 17 SDK）
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 可选：确认 Xcode 版本和 iOS SDK 版本（便于排查）
      - name: Show Xcode version
        run: |
          sudo xcode-select -s '/Applications/Xcode.app/Contents/Developer'
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos

      - name: Change to project directory
        run: |
          cd mini-ninebot
          echo "Current directory: $(pwd)"
          ls -la

      - name: List available schemes
        run: |
          cd mini-ninebot
          xcodebuild -project mini-ninebot.xcodeproj -list

      - name: Build archive (unsigned)
        run: |
          cd mini-ninebot
          xcodebuild -project mini-ninebot.xcodeproj \
            -scheme mini-ninebot \
            -sdk iphoneos \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            # 关键修改：强制指定部署目标为 17.0，确保兼容你的系统
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            archive -archivePath ../build/app.xcarchive

      - name: Export IPA
        run: |
          mkdir -p Payload
          find build/app.xcarchive -name "*.app" -exec cp -R {} Payload/ \;
          zip -r NinePlus-unsigned.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NinePlus-unsigned
          path: NinePlus-unsigned.ipa
